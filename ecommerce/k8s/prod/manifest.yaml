apiVersion: v1
kind: ConfigMap
metadata:
  name: cm-ecommerce-cg-25-03-2026
  namespace: prod-cg-25-03-2026
data:
  DEBUG: "False"
  FLASK_APP: "run.py"
  SERVER_ADDRESS: "http://localhost:5005/"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-cg-25-03-2026
  namespace: prod-cg-25-03-2026
  labels:
    app: ecommerce-cg-25-03-2026
    env: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ecommerce-cg-25-03-2026
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ecommerce-cg-25-03-2026
        env: prod
    spec:
      containers:
        - name: ecommerce
          image: ecommerce-cg-25-03-2026:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5005
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          envFrom:
            - configMapRef:
                name: cm-ecommerce-cg-25-03-2026
            - secretRef:
                name: secret-ecommerce-cg-25-03-2026
---
apiVersion: v1
kind: Service
metadata:
  name: svc-ecommerce-cg-25-03-2026
  namespace: prod-cg-25-03-2026
spec:
  type: LoadBalancer
  selector:
    app: ecommerce-cg-25-03-2026
  ports:
    - port: 5005
      targetPort: 5005
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-ecommerce-cg-25-03-2026
  namespace: prod-cg-25-03-2026
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ecommerce-cg-25-03-2026
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 4
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 15
