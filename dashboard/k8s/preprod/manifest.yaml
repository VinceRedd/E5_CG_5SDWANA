apiVersion: v1
kind: ConfigMap
metadata:
  name: cm-dashboard-cg-25-03-2026
  namespace: preprod-cg-25-03-2026
data:
  DEBUG: "False"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-cg-25-03-2026
  namespace: preprod-cg-25-03-2026
  labels:
    app: dashboard-cg-25-03-2026
    env: preprod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dashboard-cg-25-03-2026
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: dashboard-cg-25-03-2026
        env: preprod
    spec:
      containers:
        - name: dashboard
          image: dashboard-cg-25-03-2026:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5005
          resources:
            requests:
              cpu: "150m"
              memory: "128Mi"
            limits:
              cpu: "400m"
              memory: "384Mi"
          envFrom:
            - configMapRef:
                name: cm-dashboard-cg-25-03-2026
---
apiVersion: v1
kind: Service
metadata:
  name: svc-dashboard-cg-25-03-2026
  namespace: preprod-cg-25-03-2026
spec:
  type: LoadBalancer
  selector:
    app: dashboard-cg-25-03-2026
  ports:
    - port: 5005
      targetPort: 5005
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-dashboard-cg-25-03-2026
  namespace: preprod-cg-25-03-2026
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dashboard-cg-25-03-2026
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 4
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 15
